<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LynxReview - Activar Cuenta</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 25px;
        }
        .logo h1 { color: #667eea; font-size: 28px; margin-bottom: 5px; }
        .logo p { color: #666; font-size: 14px; }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            font-size: 13px;
        }
        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 8px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .switch-auth {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        .switch-auth a { color: #667eea; text-decoration: none; font-weight: 600; }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 500px) {
            .form-row { grid-template-columns: 1fr; }
            .auth-container { padding: 30px 20px; }
        }
        .plan-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            font-size: 12px;
            font-weight: 700;
            padding: 3px 12px;
            border-radius: 20px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <!-- Container hidden by default — shown only if session_id is present -->
    <div class="auth-container" id="container" style="display:none">
        <div class="logo">
            <h1>LynxReview</h1>
            <p>Crea tu cuenta para acceder al Panel de Cliente</p>
        </div>

        <div id="alertSuccess" class="alert alert-success"></div>
        <div id="alertError" class="alert alert-error"></div>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-row">
                <div class="form-group">
                    <label>Nombre del propietario</label>
                    <input type="text" id="ownerName" required placeholder="Tu nombre completo">
                </div>
                <div class="form-group">
                    <label>Nombre del negocio</label>
                    <input type="text" id="businessName" required placeholder="Nombre de tu local">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Correo electronico</label>
                    <input type="email" id="email" required placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label>Telefono</label>
                    <input type="tel" id="phone" required placeholder="+34 612 345 678">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Contrasena</label>
                    <input type="password" id="password" required minlength="6" placeholder="Min 6 caracteres">
                </div>
                <div class="form-group">
                    <label>Confirmar contrasena</label>
                    <input type="password" id="confirmPassword" required placeholder="Repite la contrasena">
                </div>
            </div>

            <input type="hidden" id="planId" value="">
            <input type="hidden" id="stripeSessionId" value="">

            <button type="submit" class="btn-primary" id="submitBtn">Activar mi cuenta</button>
        </form>

        <div class="switch-auth">
            <p>Ya tienes cuenta? <a href="/login">Iniciar sesion</a></p>
        </div>
    </div>

    <script>
    // ============================================
    // ON PAGE LOAD — gate on session_id
    // ============================================
    (function init() {
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get('session_id');
        const plan = params.get('plan') || 'plus';

        if (!sessionId) {
            // No payment session — send to main website immediately
            window.location.replace('https://www.lynxreview.com');
            return;
        }

        // Payment session present — show registration form
        document.getElementById('container').style.display = 'block';
        document.getElementById('planId').value = plan;
        document.getElementById('stripeSessionId').value = sessionId;

        // Pre-fill email if passed via URL (e.g. from checkout pre-fill)
        const email = params.get('email');
        if (email) {
            document.getElementById('email').value = email;
        }

        // Show payment confirmation banner
        const planNames = {
            basic: 'Básico — 19€/mes',
            plus: 'Plus — 39€/mes',
            premium: 'Premium — 59€/mes'
        };
        const alertEl = document.getElementById('alertSuccess');
        alertEl.innerHTML = '✓ Pago completado. Plan: <strong>' + (planNames[plan] || plan) + '</strong>. Completa tu registro para acceder.';
        alertEl.style.display = 'block';
    })();

    // ============================================
    // REGISTER FORM SUBMIT
    // ============================================
    async function handleRegister(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span>Creando tu cuenta...';
        document.getElementById('alertError').style.display = 'none';

        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (password !== confirmPassword) {
            showError('Las contrasenas no coinciden');
            btn.disabled = false;
            btn.textContent = 'Activar mi cuenta';
            return;
        }

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: document.getElementById('email').value.trim(),
                    password,
                    businessName: document.getElementById('businessName').value.trim(),
                    ownerName: document.getElementById('ownerName').value.trim(),
                    phone: document.getElementById('phone').value.trim(),
                    planId: document.getElementById('planId').value,
                    stripeSessionId: document.getElementById('stripeSessionId').value,
                })
            });

            const data = await response.json();

            if (data.success) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                document.getElementById('alertSuccess').innerHTML = '¡Cuenta creada! Redirigiendo al panel...';
                document.getElementById('alertSuccess').style.display = 'block';
                setTimeout(() => { window.location.href = '/dashboard.html'; }, 1200);
            } else {
                showError(data.error || 'Error al crear cuenta');
                btn.disabled = false;
                btn.textContent = 'Activar mi cuenta';
            }
        } catch (error) {
            showError('Error de conexion. Intenta de nuevo.');
            btn.disabled = false;
            btn.textContent = 'Activar mi cuenta';
        }
    }

    function showError(msg) {
        const el = document.getElementById('alertError');
        el.textContent = msg;
        el.style.display = 'block';
    }
    </script>
</body>
</html>
