<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LynxReview - Panel Administrador</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 25px 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 28px;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .stat-badge {
            background: #fff3cd;
            color: #856404;
            padding: 10px 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
        }

        .stat-badge.high {
            background: #dc3545;
            color: white;
        }

        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .logout-btn:hover {
            background: #c82333;
        }

        .filters {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .filter-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .filter-group label {
            font-weight: 600;
            color: #333;
        }

        .filter-group select,
        .filter-group input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .btn-refresh {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-refresh:hover {
            background: #5568d3;
        }

        .review-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #667eea;
        }

        .review-card.high-rating {
            border-left-color: #28a745;
            background: #f0fff4;
        }

        .review-card.low-rating {
            border-left-color: #dc3545;
            background: #fff5f5;
        }

        .review-header {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 20px;
            margin-bottom: 20px;
            align-items: start;
        }

        .review-info h3 {
            color: #333;
            font-size: 18px;
            margin-bottom: 8px;
        }

        .review-meta {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: #666;
            flex-wrap: wrap;
        }

        .rating-display {
            font-size: 28px;
            text-align: center;
            color: #ffc107;
            font-weight: bold;
        }

        .customer-name {
            font-weight: 600;
            color: #667eea;
        }

        .review-text {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            line-height: 1.6;
            color: #333;
            border-left: 4px solid #667eea;
        }

        .response-section {
            margin: 20px 0;
            padding: 15px;
            background: #f0f7ff;
            border-radius: 8px;
        }

        .response-section h4 {
            color: #0066cc;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .response-text {
            background: white;
            padding: 12px;
            border-radius: 5px;
            color: #333;
            border: 1px solid #ddd;
            margin-bottom: 10px;
            min-height: 80px;
            line-height: 1.5;
        }

        .textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            min-height: 100px;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn-approve {
            background: #28a745;
            color: white;
        }

        .btn-approve:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(40, 167, 69, 0.3);
        }

        .btn-deny {
            background: #dc3545;
            color: white;
        }

        .btn-deny:hover {
            background: #c82333;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(220, 53, 69, 0.3);
        }

        .btn-edit {
            background: #667eea;
            color: white;
        }

        .btn-edit:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .empty-state h2 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 16px;
            opacity: 0.9;
        }

        .loading {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 10px;
            color: #667eea;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .edit-mode {
            display: none;
        }

        .edit-mode.active {
            display: block;
        }

        .view-mode {
            display: block;
        }

        .view-mode.hidden {
            display: none;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
            background: white;
            padding: 15px;
            border-radius: 10px 10px 0 0;
        }

        .tab-btn {
            padding: 12px 20px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            margin-bottom: -15px;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
            background: white;
            padding: 25px;
            border-radius: 0 10px 10px 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .tab-content.active {
            display: block;
        }

        .qr-section {
            background: white;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .qr-section h3 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 20px;
        }

        .qr-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        .control-group label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .control-group input,
        .control-group select,
        .control-group textarea {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        .control-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .qr-preview {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 250px;
            border: 2px dashed #ddd;
        }

        .qr-preview img {
            max-width: 200px;
            max-height: 200px;
        }

        .qr-preview-empty {
            color: #999;
            font-size: 14px;
        }

        .qr-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .qr-item {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .qr-item:hover {
            border-color: #667eea;
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.2);
        }

        .qr-item.active {
            border-color: #667eea;
            background: #f0f7ff;
        }

        .qr-item img {
            width: 100%;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .qr-item-name {
            font-weight: 600;
            font-size: 12px;
            color: #333;
            margin-bottom: 5px;
            word-break: break-all;
        }

        .qr-item-delete {
            font-size: 12px;
            color: #dc3545;
            cursor: pointer;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .review-header {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .filters {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-group {
                flex-direction: column;
            }

            .qr-controls {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ð¨âð¼ Panel Administrador LynxReview</h1>
            <div class="header-actions">
                <span class="stat-badge" id="pendingBadge">â³ 0 pendientes</span>
                <button class="logout-btn" onclick="logout()">Cerrar sesiÃ³n</button>
            </div>
        </div>

        <div id="message" class="message"></div>

        <div class="filters">
            <div class="filter-group">
                <label>Filtrar por:</label>
                <select id="ratingFilter" onchange="filterReviews()">
                    <option value="">Todas las puntuaciones</option>
                    <option value="1">1 Estrella</option>
                    <option value="2">2 Estrellas</option>
                    <option value="3">3 Estrellas</option>
                    <option value="4">4 Estrellas</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Estado:</label>
                <select id="statusFilter" onchange="filterReviews()">
                    <option value="pending_response">Pendientes de respuesta</option>
                    <option value="">Todos</option>
                    <option value="approved">Aprobadas</option>
                    <option value="denied">Denegadas</option>
                    <option value="published">Publicadas</option>
                </select>
            </div>
            <button class="btn-refresh" onclick="loadReviews()">ð Actualizar</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('reviews')">ð Respuestas Pendientes</button>
            <button class="tab-btn" onclick="switchTab('qr')">ð± Generador QR</button>
        </div>

        <div id="reviews-tab" class="tab-content active">
            <div id="reviewsList">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Cargando reseÃ±as pendientes...</p>
                </div>
            </div>
        </div>

        <div id="qr-tab" class="tab-content">
            <div class="qr-section">
                <h3>âï¸ Controles</h3>
                <div class="qr-controls">
                    <div class="control-group">
                        <label>Generar Nuevo QR</label>
                        <input type="text" id="qrInput" placeholder="Escribe texto o URL para el QR..." />
                        <button class="btn btn-refresh" onclick="generateQR()" style="margin-top: 10px;">â© Generar QR</button>
                    </div>       <button class="btn btn-refresh" onclick="generateQR()" style="margin-top: 10px;">â Generar QR</button>
                    </div>
                    <div class="control-group">
                        <label>Seleccionar QR</label>
                        <select id="qrSelect" onchange="selectQR()">
                            <option value="">Selecciona un QR...</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>URL de Google Maps</label>
                        <input type="text" id="mapsUrl" placeholder="https://maps.app.goo.gl/xxxxx" />
                        <button class="btn btn-refresh" onclick="saveMapsUrl()" style="margin-top: 10px;">ð¾ Guardar URL</button>
                    </div>
                </div>

                <h3 style="margin-top: 30px;">ðï¸ Vista Previa</h3>
                <div class="qr-preview" id="qrPreview">
                    <div class="qr-preview-empty">Selecciona un QR para previsualizar</div>
                </div>

                <h3 style="margin-top: 30px;">ð¦ QRs Activos</h3>
                <div class="qr-list" id="qrList">
                    <div style="grid-column: 1 / -1; text-align: center; color: #999; padding: 30px;">
                        No hay QRs generados aÃºn
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const token = localStorage.getItem('admin_token') || localStorage.getItem('token');
        if (!token) {
            window.location.href = '/admin';
        }

        let allReviews = [];
        let filteredReviews = [];
        let qrCodes = JSON.parse(localStorage.getItem('qrCodes') || '{}');
        let currentQRId = null;

        // Load reviews on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadReviews();
            loadQRList();
            // Refresh every 30 seconds
            setInterval(loadReviews, 30000);
        });

        async function loadReviews() {
            try {
                const response = await fetch('/api/reviews/pending', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                if (data.success) {
                    allReviews = data.reviews;
                    filteredReviews = allReviews;
                    displayReviews();
                    updateBadge();
                } else {
                    showMessage('Error: ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('Error al cargar reseÃ±as: ' + error.message, 'error');
            }
        }

        function displayReviews() {
            const reviewsList = document.getElementById('reviewsList');

            if (!filteredReviews || filteredReviews.length === 0) {
                reviewsList.innerHTML = `
                    <div class="empty-state">
                        <h2>â¨ Â¡Listo!</h2>
                        <p>No hay reseÃ±as pendientes de aprobaciÃ³n en este momento</p>
                    </div>
                `;
                return;
            }

            reviewsList.innerHTML = filteredReviews.map((review, index) => `
                <div class="review-card ${review.rating === 5 ? 'high-rating' : review.rating <= 2 ? 'low-rating' : ''}" id="review-${review._id}">
                    <div class="review-header">
                        <div class="review-info">
                            <h3><span class="customer-name">${escapeHtml(review.reviewerName || 'Cliente')}</span></h3>
                            <div class="review-meta">
                                <span>ð§ ${review.reviewerEmail || 'N/A'}</span>
                                <span>ð ${new Date(review.reviewDate).toLocaleDateString('es-ES')}</span>
                                <span>Cliente: ${review.clienteId}</span>
                            </div>
                        </div>
                        <div class="rating-display">${'â­'.repeat(review.rating)}</div>
                    </div>

                    <div class="review-text">${escapeHtml(review.reviewText)}</div>

                    <div class="response-section">
                        <h4>ð¬ Respuesta Propuesta (por IA)</h4>
                        <div class="response-text" id="proposedResponse-${review._id}">
                            ${escapeHtml(review.proposedResponse)}
                        </div>

                        <div id="editMode-${review._id}" class="edit-mode">
                            <h4 style="margin-bottom: 10px;">Editar respuesta:</h4>
                            <textarea class="textarea" id="customResponse-${review._id}" placeholder="Escribe una respuesta personalizada...">
${escapeHtml(review.proposedResponse)}</textarea>
                        </div>
                    </div>

                    <div class="actions">
                        <button class="btn btn-edit" onclick="toggleEditMode('${review._id}')">âï¸ Editar respuesta</button>
                        <button class="btn btn-approve" onclick="approveReview('${review._id}')">â Aprobar y publicar</button>
                        <button class="btn btn-deny" onclick="showDenyReason('${review._id}')">â Denegar</button>
                    </div>

                    <div id="denyForm-${review._id}" style="display: none; margin-top: 15px; padding: 15px; background: #fff5f5; border-radius: 5px;">
                        <textarea class="textarea" id="denyReason-${review._id}" placeholder="Â¿Por quÃ© denegar esta respuesta?"></textarea>
                        <div style="margin-top: 10px; display: flex; gap: 10px;">
                            <button class="btn btn-deny" onclick="denyReview('${review._id}')">Confirmar denegaciÃ³n</button>
                            <button class="btn btn-secondary" onclick="hideDenyReason('${review._id}')">Cancelar</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleEditMode(reviewId) {
            const editMode = document.getElementById(`editMode-${reviewId}`);
            const proposedResponse = document.getElementById(`proposedResponse-${reviewId}`);

            if (editMode.classList.contains('active')) {
                editMode.classList.remove('active');
                proposedResponse.classList.remove('hidden');
            } else {
                editMode.classList.add('active');
                proposedResponse.classList.add('hidden');
            }
        }

        function showDenyReason(reviewId) {
            document.getElementById(`denyForm-${reviewId}`).style.display = 'block';
        }

        function hideDenyReason(reviewId) {
            document.getElementById(`denyForm-${reviewId}`).style.display = 'none';
        }

        async function approveReview(reviewId) {
            try {
                const customResponse = document.getElementById(`customResponse-${reviewId}`);
                const response = customResponse ? customResponse.value : undefined;

                const approveResponse = await fetch(`/api/reviews/${reviewId}/approve`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ response })
                });

                const data = await approveResponse.json();

                if (data.success) {
                    showMessage('â Respuesta aprobada y publicada en Google', 'success');
                    setTimeout(() => loadReviews(), 1500);
                } else {
                    showMessage('Error: ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('Error al aprobar: ' + error.message, 'error');
            }
        }

        async function denyReview(reviewId) {
            try {
                const reason = document.getElementById(`denyReason-${reviewId}`).value;

                const denyResponse = await fetch(`/api/reviews/${reviewId}/deny`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ reason })
                });

                const data = await denyResponse.json();

                if (data.success) {
                    showMessage('â ReseÃ±a denegada', 'success');
                    setTimeout(() => loadReviews(), 1500);
                } else {
                    showMessage('Error: ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('Error al denegar: ' + error.message, 'error');
            }
        }

        function filterReviews() {
            const ratingFilter = document.getElementById('ratingFilter').value;
            const statusFilter = document.getElementById('statusFilter').value || 'pending_response';

            filteredReviews = allReviews.filter(review => {
                const matchesRating = !ratingFilter || review.rating === parseInt(ratingFilter);
                const matchesStatus = !statusFilter || review.status === statusFilter;
                return matchesRating && matchesStatus;
            });

            displayReviews();
        }

        function updateBadge() {
            const pending = allReviews.filter(r => r.status === 'pending_response').length;
            const badge = document.getElementById('pendingBadge');
            badge.textContent = `â³ ${pending} pendientes`;
            badge.classList.toggle('high', pending > 0);
        }

        function showMessage(message, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = message;
            messageEl.className = `message show ${type}`;
            setTimeout(() => messageEl.classList.remove('show'), 5000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('admin_token');
            window.location.href = '/admin';
        }

        // QR Code Functions
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(`${tabName}-tab`).classList.add('active');
            event.target.classList.add('active');
        }

        function generateQR() {
            const input = document.getElementById('qrInput').value.trim();
            if (!input) {
                showMessage('Por favor ingresa texto o URL para generar el QR', 'error');
                return;
            }

            const qrId = Date.now().toString();
            const qrCode = {
                id: qrId,
                data: input,
                timestamp: new Date().toLocaleString('es-ES'),
                mapsUrl: ''
            };

            qrCodes[qrId] = qrCode;
            localStorage.setItem('qrCodes', JSON.stringify(qrCodes));

            document.getElementById('qrInput').value = '';
            loadQRList();
            selectQRById(qrId);
            showMessage('â QR generado exitosamente', 'success');
        }

        function loadQRList() {
            const select = document.getElementById('qrSelect');
            const list = document.getElementById('qrList');

            // Update select dropdown
            select.innerHTML = '<option value="">Selecciona un QR...</option>';
            let listHTML = '';

            if (Object.keys(qrCodes).length === 0) {
                list.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; color: #999; padding: 30px;">No hay QRs generados aÃºn</div>';
                return;
            }

            Object.entries(qrCodes).forEach(([id, qr]) => {
                const label = qr.data.substring(0, 30) + (qr.data.length > 30 ? '...' : '');
                select.innerHTML += `<option value="${id}">${label}</option>`;

                listHTML += `
                    <div class="qr-item ${currentQRId === id ? 'active' : ''}" onclick="selectQRById('${id}')" id="qr-item-${id}">
                        <div id="qr-code-${id}" style="margin-bottom: 10px;"></div>
                        <div class="qr-item-name" title="${qr.data}">${label}</div>
                        <div class="qr-item-delete" onclick="deleteQR('${id}', event)">â Eliminar</div>
                    </div>
                `;
            });

            list.innerHTML = listHTML;

            // Generate QR codes for all items
            Object.entries(qrCodes).forEach(([id, qr]) => {
                const container = document.getElementById(`qr-code-${id}`);
                if (container && container.children.length === 0) {
                    new QRCode(container, {
                        text: qr.data,
                        width: 120,
                        height: 120,
                        colorDark: "#000000",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                }
            });
        }

        function selectQR() {
            const select = document.getElementById('qrSelect');
            const id = select.value;
            if (id) {
                selectQRById(id);
            }
        }

        function selectQRById(id) {
            currentQRId = id;
            const qr = qrCodes[id];

            if (!qr) return;

            // Update active state in list
            document.querySelectorAll('.qr-item').forEach(item => {
                item.classList.remove('active');
            });
            document.getElementById(`qr-item-${id}`).classList.add('active');

            // Update select dropdown
            document.getElementById('qrSelect').value = id;

            // Update preview
            const preview = document.getElementById('qrPreview');
            preview.innerHTML = '';
            new QRCode(preview, {
                text: qr.data,
                width: 200,
                height: 200,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            // Update maps URL input
            document.getElementById('mapsUrl').value = qr.mapsUrl || '';
        }

        function deleteQR(id, event) {
            event.stopPropagation();
            if (confirm('Â¿EstÃ¡s seguro de que deseas eliminar este QR?')) {
                delete qrCodes[id];
                localStorage.setItem('qrCodes', JSON.stringify(qrCodes));

                if (currentQRId === id) {
                    currentQRId = null;
                    document.getElementById('qrPreview').innerHTML = '<div class="qr-preview-empty">Selecciona un QR para previsualizar</div>';
                    document.getElementById('mapsUrl').value = '';
                }

                loadQRList();
                showMessage('â QR eliminado', 'success');
            }
        }

        function saveMapsUrl() {
            if (!currentQRId) {
                showMessage('Por favor selecciona un QR primero', 'error');
                return;
            }

            const url = document.getElementById('mapsUrl').value.trim();
            if (!url) {
                showMessage('Por favor ingresa una URL de Google Maps', 'error');
                return;
            }

            qrCodes[currentQRId].mapsUrl = url;
            localStorage.setItem('qrCodes', JSON.stringify(qrCodes));
            showMessage('â URL de Google Maps guardada', 'success');
        }
    </script>
</body>
</html>
