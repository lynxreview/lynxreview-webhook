<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LynxReview - Panel Administrador</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: white; padding: 25px 30px; border-radius: 10px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { color: #667eea; font-size: 28px; }
        .header-actions { display: flex; gap: 15px; align-items: center; }
        .stat-badge { background: #fff3cd; color: #856404; padding: 10px 15px; border-radius: 20px; font-weight: 600; font-size: 14px; }
        .stat-badge.high { background: #dc3545; color: white; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .logout-btn:hover { background: #c82333; }
        .filters { background: white; padding: 20px; border-radius: 10px; margin-bottom: 25px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .filter-group { display: flex; gap: 10px; align-items: center; }
        .filter-group label { font-weight: 600; color: #333; }
        .filter-group select, .filter-group input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        .btn-refresh { background: #667eea; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-weight: 600; }
        .btn-refresh:hover { background: #5568d3; }
        .review-card { background: white; border-radius: 10px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid #667eea; }
        .review-card.high-rating { border-left-color: #28a745; background: #f0fff4; }
        .review-card.low-rating { border-left-color: #dc3545; background: #fff5f5; }
        .review-header { display: grid; grid-template-columns: 1fr auto auto; gap: 20px; margin-bottom: 20px; align-items: start; }
        .review-info h3 { color: #333; font-size: 18px; margin-bottom: 8px; }
        .review-meta { display: flex; gap: 20px; font-size: 13px; color: #666; flex-wrap: wrap; }
        .rating-display { font-size: 28px; text-align: center; color: #ffc107; font-weight: bold; }
        .customer-name { font-weight: 600; color: #667eea; }
        .review-text { background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 20px 0; line-height: 1.6; color: #333; border-left: 4px solid #667eea; }
        .response-section { margin: 20px 0; padding: 15px; background: #f0f7ff; border-radius: 8px; }
        .response-section h4 { color: #0066cc; margin-bottom: 10px; font-size: 14px; }
        .response-text { background: white; padding: 12px; border-radius: 5px; color: #333; border: 1px solid #ddd; margin-bottom: 10px; min-height: 80px; line-height: 1.5; }
        .textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-family: inherit; font-size: 14px; resize: vertical; min-height: 100px; }
        .actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: 600; font-size: 14px; transition: all 0.3s ease; }
        .btn-approve { background: #28a745; color: white; }
        .btn-approve:hover { background: #218838; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(40,167,69,0.3); }
        .btn-deny { background: #dc3545; color: white; }
        .btn-deny:hover { background: #c82333; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(220,53,69,0.3); }
        .btn-edit { background: #667eea; color: white; }
        .btn-edit:hover { background: #5568d3; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-secondary:hover { background: #5a6268; }
        .empty-state { text-align: center; padding: 60px 20px; color: white; }
        .empty-state h2 { font-size: 32px; margin-bottom: 10px; }
        .empty-state p { font-size: 16px; opacity: 0.9; }
        .loading { text-align: center; padding: 40px; background: white; border-radius: 10px; color: #667eea; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .message { padding: 15px; border-radius: 5px; margin-bottom: 20px; display: none; }
        .message.show { display: block; }
        .message.success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
        .message.error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
        .edit-mode { display: none; }
        .edit-mode.active { display: block; }
        .view-mode { display: block; }
        .view-mode.hidden { display: none; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; background: white; padding: 15px; border-radius: 10px 10px 0 0; }
        .tab-btn { padding: 12px 20px; border: none; background: transparent; cursor: pointer; font-weight: 600; color: #666; border-bottom: 3px solid transparent; transition: all 0.3s ease; margin-bottom: -15px; }
        .tab-btn.active { color: #667eea; border-bottom-color: #667eea; }
        .tab-content { display: none; background: white; padding: 25px; border-radius: 0 10px 10px 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab-content.active { display: block; }
        @media (max-width: 768px) {
            .review-header { grid-template-columns: 1fr; }
            .header { flex-direction: column; gap: 15px; text-align: center; }
            .filters { flex-direction: column; align-items: stretch; }
            .filter-group { flex-direction: column; }
            .tabs { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Panel Administrador LynxReview</h1>
            <div class="header-actions">
                <span class="stat-badge" id="pendingBadge">0 pendientes</span>
                <button class="logout-btn" onclick="logout()">Cerrar sesion</button>
            </div>
        </div>
        <div id="message" class="message"></div>
        <div class="filters">
            <div class="filter-group">
                <label>Filtrar por:</label>
                <select id="ratingFilter" onchange="filterReviews()">
                    <option value="">Todas las puntuaciones</option>
                    <option value="1">1 Estrella</option>
                    <option value="2">2 Estrellas</option>
                    <option value="3">3 Estrellas</option>
                    <option value="4">4 Estrellas</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Estado:</label>
                <select id="statusFilter" onchange="filterReviews()">
                    <option value="pending_response">Pendientes de respuesta</option>
                    <option value="">Todos</option>
                    <option value="approved">Aprobadas</option>
                    <option value="denied">Denegadas</option>
                    <option value="published">Publicadas</option>
                </select>
            </div>
            <button class="btn-refresh" onclick="loadReviews()">Actualizar</button>
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('reviews')">Respuestas Pendientes</button>
            <button class="tab-btn" onclick="switchTab('qr')">Generador QR</button>
        </div>
        <div id="reviews-tab" class="tab-content active">
            <div id="reviewsList">
                <div class="loading"><div class="spinner"></div><p>Cargando resenas pendientes...</p></div>
            </div>
        </div>
        <div id="qr-tab" class="tab-content">
            <div style="text-align: center; padding: 40px; color: #999;">
                <h3>Generador QR - Proximamente</h3>
                <p>Esta funcionalidad estara disponible pronto.</p>
            </div>
        </div>
    </div>
    <script>
        const token = localStorage.getItem('admin_token') || localStorage.getItem('token');
        if (!token) { window.location.href = '/admin'; }

        let allReviews = [];
        let filteredReviews = [];

        window.addEventListener('DOMContentLoaded', () => {
            loadReviews();
            setInterval(loadReviews, 30000);
        });

        async function loadReviews() {
            try {
                const response = await fetch('/api/reviews/pending', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (data.success) {
                    allReviews = data.reviews;
                    filteredReviews = allReviews;
                    displayReviews();
                    updateBadge();
                } else {
                    showMessage('Error: ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('Error al cargar resenas: ' + error.message, 'error');
            }
        }

        function displayReviews() {
            const reviewsList = document.getElementById('reviewsList');
            if (!filteredReviews || filteredReviews.length === 0) {
                reviewsList.innerHTML = '<div class="empty-state"><h2>Listo!</h2><p>No hay resenas pendientes de aprobacion en este momento</p></div>';
                return;
            }
            reviewsList.innerHTML = filteredReviews.map((review) => `
                <div class="review-card ${review.rating === 5 ? 'high-rating' : review.rating <= 2 ? 'low-rating' : ''}" id="review-${review._id}">
                    <div class="review-header">
                        <div class="review-info">
                            <h3><span class="customer-name">${escapeHtml(review.reviewerName || 'Cliente')}</span></h3>
                            <div class="review-meta">
                                <span>${new Date(review.reviewDate).toLocaleDateString('es-ES')}</span>
                                <span>Cliente: ${review.clienteId}</span>
                            </div>
                        </div>
                        <div class="rating-display">${'*'.repeat(review.rating)}</div>
                    </div>
                    <div class="review-text">${escapeHtml(review.reviewText)}</div>
                    <div class="response-section">
                        <h4>Respuesta Propuesta (por IA)</h4>
                        <div class="response-text" id="proposedResponse-${review._id}">${escapeHtml(review.proposedResponse)}</div>
                        <div id="editMode-${review._id}" class="edit-mode">
                            <h4 style="margin-bottom: 10px;">Editar respuesta:</h4>
                            <textarea class="textarea" id="customResponse-${review._id}">${escapeHtml(review.proposedResponse)}</textarea>
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn btn-edit" onclick="toggleEditMode('${review._id}')">Editar respuesta</button>
                        <button class="btn btn-approve" onclick="approveReview('${review._id}')">Aprobar y publicar</button>
                        <button class="btn btn-deny" onclick="showDenyReason('${review._id}')">Denegar</button>
                    </div>
                    <div id="denyForm-${review._id}" style="display: none; margin-top: 15px; padding: 15px; background: #fff5f5; border-radius: 5px;">
                        <textarea class="textarea" id="denyReason-${review._id}" placeholder="Por que denegar esta respuesta?"></textarea>
                        <div style="margin-top: 10px; display: flex; gap: 10px;">
                            <button class="btn btn-deny" onclick="denyReview('${review._id}')">Confirmar denegacion</button>
                            <button class="btn btn-secondary" onclick="hideDenyReason('${review._id}')">Cancelar</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleEditMode(reviewId) {
            const editMode = document.getElementById(`editMode-${reviewId}`);
            const proposedResponse = document.getElementById(`proposedResponse-${reviewId}`);
            if (editMode.classList.contains('active')) {
                editMode.classList.remove('active');
                proposedResponse.classList.remove('hidden');
            } else {
                editMode.classList.add('active');
                proposedResponse.classList.add('hidden');
            }
        }

        function showDenyReason(reviewId) { document.getElementById(`denyForm-${reviewId}`).style.display = 'block'; }
        function hideDenyReason(reviewId) { document.getElementById(`denyForm-${reviewId}`).style.display = 'none'; }

        async function approveReview(reviewId) {
            try {
                const customResponse = document.getElementById(`customResponse-${reviewId}`);
                const response = customResponse ? customResponse.value : undefined;
                const approveResponse = await fetch(`/api/reviews/${reviewId}/approve`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ response })
                });
                const data = await approveResponse.json();
                if (data.success) {
                    showMessage('Respuesta aprobada y publicada en Google', 'success');
                    setTimeout(() => loadReviews(), 1500);
                } else { showMessage('Error: ' + data.error, 'error'); }
            } catch (error) { showMessage('Error al aprobar: ' + error.message, 'error'); }
        }

        async function denyReview(reviewId) {
            try {
                const reason = document.getElementById(`denyReason-${reviewId}`).value;
                const denyResponse = await fetch(`/api/reviews/${reviewId}/deny`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ reason })
                });
                const data = await denyResponse.json();
                if (data.success) {
                    showMessage('Resena denegada', 'success');
                    setTimeout(() => loadReviews(), 1500);
                } else { showMessage('Error: ' + data.error, 'error'); }
            } catch (error) { showMessage('Error al denegar: ' + error.message, 'error'); }
        }

        function filterReviews() {
            const ratingFilter = document.getElementById('ratingFilter').value;
            const statusFilter = document.getElementById('statusFilter').value || 'pending_response';
            filteredReviews = allReviews.filter(review => {
                const matchesRating = !ratingFilter || review.rating === parseInt(ratingFilter);
                const matchesStatus = !statusFilter || review.status === statusFilter;
                return matchesRating && matchesStatus;
            });
            displayReviews();
        }

        function updateBadge() {
            const pending = allReviews.filter(r => r.status === 'pending_response').length;
            const badge = document.getElementById('pendingBadge');
            badge.textContent = pending + ' pendientes';
            badge.classList.toggle('high', pending > 0);
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');
        }

        function showMessage(message, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = message;
            messageEl.className = 'message show ' + type;
            setTimeout(() => messageEl.classList.remove('show'), 5000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('admin_token');
            window.location.href = '/admin';
        }
    </script>
</body>
</html>
